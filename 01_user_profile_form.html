<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./01_user_form.css">
    <title>USerProfileForm</title>
</head>
<body>
    <form action="">
        <fieldset>
            <div class="container">
                <h1 class="h1">
                    USER PROFILE FORM
                </h1>
                <p class="upload-area">
                    Photo Uplode Area
                </p>
                <img src="" alt="프로필">
                <br>
                <button type="button" class="upload-button">
                UPLOAD PHOTO
                </button>

                <br>
                <label for="Fname">
                    Full Name
                </label>
                <br> 
                <input type="text"" id="Fname">
                <br>
                <label for="job">
                    Job Title
                </label>
                <br>
                <input type="text" id="job">
                <br>
                <label for="email">Email Address</label>
                <br>
                <input type="email" id="email" placeholder="email">
                <br>
                <label for="bio">Brief Bio</label>
                <br>
                <textarea name="bio" id="bio" placeholder="A short bio about yourself..."></textarea>
                
                <br>
                <span>Online Links to Include</span>
                <br>
                <div class="checkboxS">
                    <input type="checkbox" name="onlinelink" id="portfolio" class="onlinelink">
                    <label for="portfolio">Portpolio</label>
                    <br>
                    <input type="checkbox" name="onlinelink" id="linkedln" class="onlinelink">
                    <label for="portfolio">Linkedln</label>
                    <br>
                    <input type="checkbox" name="onlinelink" id="github" class="onlinelink">
                    <label for="portfolio">GitHub</label>
                </div> 
            </div>
            <br>

            <button type="submit" class="save">SAVE PROFILE</button>
        </fieldset>
        
    </form>
</body>
</html>
